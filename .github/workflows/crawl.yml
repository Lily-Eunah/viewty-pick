name: Daily Price Sync & Crawl

on:
  schedule:
    - cron: "0 19 * * *" # UTC 19:00 = KST 04:00
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # crawler:sync (Step 1 of crawler/run.ts) already runs the sheet import, so a
      # separate import step here would import TWICE per workflow run — doubling
      # Coupang image-resolution calls and blowing the 50/min rate limit, which
      # left every product image unresolved (then blanked). One run = one import.
      # --skip-seller=oliveyoung: OliveYoung is priced by a HEADFUL page crawl that must
      # run on a real-display, residential-IP machine (Cloudflare blocks headful from
      # this datacenter runner ~2/3 of the time). That runs out-of-band via
      # `npm run oliveyoung:crawl:local` on the operator's machine (Windows Task
      # Scheduler) — see docs/ops/oliveyoung-local-crawl.md. This crawl still does
      # everything else (Naver/Coupang + current_prices/scores/images/revalidate).
      - name: Run Crawler & Recalculate Scores
        run: npm run crawler:sync -- --skip-seller=oliveyoung
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          # IndexNow re-indexing (Bing·Naver·Yandex) after the daily sync. Both must be
          # set for it to fire — INDEXNOW_KEY (the ownership key) and SITE_INDEXABLE=true
          # (never ping while the site is still noindex). No-op otherwise.
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_INDEXABLE: ${{ secrets.SITE_INDEXABLE }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          CRAWLER_USER_AGENT: ${{ secrets.CRAWLER_USER_AGENT }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # LLM 제목 파싱(개수/용량/구성). GEMINI_API_KEYS 시크릿(쉼표로 다계정 가능) 필요.
          # 키 없으면 run.ts가 자동 off(안전). 모델은 미설정 시 코드 기본값(gemini-3.1-flash-lite).
          LLM_TITLE_PARSE: 'on'
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

  # Nightly rebuild + deploy. On the Workers FREE plan every on-Worker render has a
  # 10ms CPU budget, so ISR revalidation (self-reference fetch) succeeds only by
  # luck — pages CANNOT reliably re-render themselves with fresh prices. The build,
  # however, runs here in CI with no CPU cap: prerender the whole catalog with the
  # just-crawled prices and ship it, so the Worker only ever serves cache hits.
  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    steps:
      # Deploy needs CLOUDFLARE_API_TOKEN (Workers Scripts / KV / R2 edit). Skip
      # gracefully (with a warning annotation) until the secret is configured, so
      # the crawl job's daily green/red signal stays meaningful on its own.
      - name: Gate on deploy secrets
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping nightly rebuild/deploy"
          fi

      - name: Checkout Repository
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      # Build-time env: the anon Supabase keys feed generateStaticParams + page
      # prerenders (read-only). SITE_INDEXABLE is baked into the prerendered HTML
      # (robots meta) — leave the secret unset until public launch, matching the
      # current noindex state.
      - name: Build & Deploy to Cloudflare Workers
        if: steps.gate.outputs.skip != 'true'
        run: npm run cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SITE_INDEXABLE: ${{ secrets.SITE_INDEXABLE }}

  # Post-crawl/deploy warmup + self-heal. The crawler's revalidate purges every
  # route; the first render after it can transiently fail (Supabase still busy from
  # the crawl's writes) and OpenNext then CACHES that 500 as the route response —
  # /best stayed broken all day until a manual revalidate/deploy. Warm the key
  # routes; on a 500, re-fire /api/revalidate and retry. Fail the job only if a
  # route never recovers, so Discord/Actions surfaces it. Runs even when the deploy
  # is skipped or failed — the crawl purge alone already needs the warmup.
  verify:
    needs: [crawl, deploy]
    if: always() && needs.crawl.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Warm up & self-heal key routes
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          BASE="https://viewtypick.com"
          check() { curl -s -o /dev/null -w "%{http_code}" "$BASE$1"; }
          heal=0
          for route in / /best /best/toner-best; do
            for attempt in 1 2 3; do
              code=$(check "$route")
              echo "GET $route → $code (attempt $attempt)"
              if [ "$code" = "200" ]; then break; fi
              if [ "$code" = "500" ]; then
                echo "→ 500: re-firing revalidate to purge the poisoned route cache"
                curl -s -X POST "$BASE/api/revalidate" -H "Content-Type: application/json" \
                  -d "{\"secret\":\"$REVALIDATE_SECRET\"}" -o /dev/null
                heal=1
              fi
              sleep 10
            done
            if [ "$code" != "200" ]; then
              echo "::error::$route still $code after retries"
              exit 1
            fi
          done
          [ "$heal" = "1" ] && echo "Self-healed at least one poisoned route." || echo "All routes healthy."
