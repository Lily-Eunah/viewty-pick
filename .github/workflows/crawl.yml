name: Daily Price Sync & Crawl

on:
  schedule:
    - cron: "0 19 * * *" # UTC 19:00 = KST 04:00
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # crawler:sync (Step 1 of crawler/run.ts) already runs the sheet import, so a
      # separate import step here would import TWICE per workflow run — doubling
      # Coupang image-resolution calls and blowing the 50/min rate limit, which
      # left every product image unresolved (then blanked). One run = one import.
      - name: Run Crawler & Recalculate Scores
        run: npm run crawler:sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CRAWLER_USER_AGENT: ${{ secrets.CRAWLER_USER_AGENT }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # LLM 제목 파싱(개수/용량/구성). GEMINI_API_KEYS 시크릿(쉼표로 다계정 가능) 필요.
          # 키 없으면 run.ts가 자동 off(안전). 모델은 미설정 시 코드 기본값(gemini-3.1-flash-lite).
          LLM_TITLE_PARSE: 'on'
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

      # Post-crawl warmup + self-heal. The crawler's revalidate purges every route;
      # the first render after it can transiently fail (Supabase still busy from the
      # crawl's writes) and OpenNext then CACHES that 500 as the route response —
      # /best stayed broken all day until a manual revalidate/deploy. Warm the key
      # routes; on a 500, re-fire /api/revalidate and retry. Fail the job only if a
      # route never recovers, so Discord/Actions surfaces it.
      - name: Warm up & self-heal key routes
        if: always()
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          BASE="https://viewtypick.com"
          check() { curl -s -o /dev/null -w "%{http_code}" "$BASE$1"; }
          heal=0
          for route in / /best /best/toner-best; do
            for attempt in 1 2 3; do
              code=$(check "$route")
              echo "GET $route → $code (attempt $attempt)"
              if [ "$code" = "200" ]; then break; fi
              if [ "$code" = "500" ]; then
                echo "→ 500: re-firing revalidate to purge the poisoned route cache"
                curl -s -X POST "$BASE/api/revalidate" -H "Content-Type: application/json" \
                  -d "{\"secret\":\"$REVALIDATE_SECRET\"}" -o /dev/null
                heal=1
              fi
              sleep 10
            done
            if [ "$code" != "200" ]; then
              echo "::error::$route still $code after retries"
              exit 1
            fi
          done
          [ "$heal" = "1" ] && echo "Self-healed at least one poisoned route." || echo "All routes healthy."
