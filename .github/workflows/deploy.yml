name: Deploy (Build & Ship to Cloudflare)

# Manual, crawl-free deploy. Ships the current default branch: statically
# prerendered in CI (no Workers 10ms CPU cap) then pushed to Cloudflare Workers,
# so the Worker only ever serves cache hits. Use this to release code/UI changes
# WITHOUT running the daily price crawl. Prices are refreshed separately by the
# daily crawl workflow (crawl.yml), which runs its own deploy afterwards — do not
# run crawl.yml just to ship a code change.
on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      # Deploy needs CLOUDFLARE_API_TOKEN (Workers Scripts / KV / R2 edit). Skip
      # gracefully with a warning if it's missing, so a misconfigured run is a
      # loud no-op rather than a confusing failure.
      - name: Gate on deploy secrets
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping deploy"
          fi

      - name: Checkout Repository
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      # Build-time env MUST match the nightly deploy in crawl.yml: the anon
      # Supabase keys feed generateStaticParams + page prerenders (the real
      # catalog, not the placeholder mock), and SITE_INDEXABLE is baked into the
      # prerendered robots meta. Omitting either would ship mock data or silently
      # noindex the live site.
      - name: Build & Deploy to Cloudflare Workers
        if: steps.gate.outputs.skip != 'true'
        run: npm run cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SITE_INDEXABLE: ${{ secrets.SITE_INDEXABLE }}

      # cf:deploy completing means the new Worker is live, so serving is a cache
      # hit immediately. Retry a couple of times only to absorb edge propagation.
      - name: Smoke check key routes
        if: steps.gate.outputs.skip != 'true'
        run: |
          BASE="https://viewtypick.com"
          for route in / /c/suncare /best; do
            code=""
            for attempt in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$route")
              echo "GET $route → $code (attempt $attempt)"
              [ "$code" = "200" ] && break
              sleep 10
            done
            if [ "$code" != "200" ]; then
              echo "::error::$route returned $code after deploy"
              exit 1
            fi
          done
          echo "All smoke-checked routes healthy."
