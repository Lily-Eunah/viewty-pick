name: Revalidate Test

# Manual-only. POSTs to /api/revalidate with the repo REVALIDATE_SECRET — the exact
# on-demand cache-invalidation call the daily crawl makes at Step 8 — WITHOUT running
# the ~11m crawl. Use it to verify the GitHub-secret ↔ Worker-secret path in ~10s.
# A successful run also actually purges the product cache (cards re-render from the
# current DB on the next request).
on:
  workflow_dispatch: {}

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/revalidate
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
        run: |
          URL="${REVALIDATE_URL:-https://viewtypick.com/api/revalidate}"
          echo "target : $URL"
          echo "secret length : ${#REVALIDATE_SECRET}"   # compare with your .env value's length
          code=$(curl -sS -o resp.json -w "%{http_code}" -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"$REVALIDATE_SECRET\"}")
          echo "HTTP $code"
          echo "response : $(cat resp.json)"
          if [ "$code" != "200" ]; then
            echo "::error::revalidate failed (HTTP $code) — GitHub REVALIDATE_SECRET does not match the Worker secret"
            exit 1
          fi
          echo "::notice::revalidate ok (HTTP 200) — GitHub secret matches the Worker; product cache purged"
